<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHU-JEN LIN | Projects</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #60a5fa; --bg: #0b0f1a; --text: #f1f5f9; --card: #161e2d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-top: 80px; }
        nav { display: flex; justify-content: center; gap: 30px; padding: 25px; background: rgba(11, 15, 26, 0.95); position: fixed; top: 0; width: 100%; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav a { color: var(--text); text-decoration: none; font-weight: 600; opacity: 0.6; }
        nav a.active { opacity: 1; color: var(--primary); }
        .container { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }
        h1 { font-size: 2.5rem; margin-bottom: 40px; border-left: 5px solid var(--primary); padding-left: 20px; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .project-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .project-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .project-img { width: 100%; height: 220px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--primary); }
        .project-info { padding: 25px; }
        .project-info h3 { color: #fff; margin-bottom: 10px; }
        .tag { background: rgba(59,130,246,0.1); color: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; margin: 0 8px 8px 0; display: inline-block; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="projects.html" class="active">Projects</a>
        <a href="cv.html">Resume</a>
    </nav>
    <div class="container">
        <h1>Technical Projects</h1>
        <div class="project-grid">
            <div class="project-card">
                <div class="project-img"><i class="fas fa-robot"></i></div>
                <div class="project-info">
                    <div class="tags"><span class="tag">ROS2</span><span class="tag">Digital Twin</span></div>
                    <h3>Autonomous UGV System</h3>
                    <p>High-fidelity simulation and control for unmanned ground vehicles using NVIDIA Omniverse.</p>
                </div>
            </div>
            <div class="project-card">
                <div class="project-img"><i class="fas fa-microchip"></i></div>
                <div class="project-info">
                    <div class="tags"><span class="tag">RTOS</span><span class="tag">Control Theory</span></div>
                    <h3>Spherical Robot Control</h3>
                    <p>Dynamic balancing and real-time motion planning for spherical robotic platforms.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
