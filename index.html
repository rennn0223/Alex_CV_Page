<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHU-JEN LIN | Systems Architect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --accent: #10b981; --bg: #050505; --card: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        
        /* 背景網格特效 */
        body::before { content: ""; position: absolute; width: 100%; height: 100%; background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }

        nav { display: flex; justify-content: center; gap: 40px; padding: 25px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); position: fixed; width: 100%; top: 0; z-index: 1000; }
        nav a { color: #fff; text-decoration: none; font-weight: 600; font-size: 0.9rem; letter-spacing: 2px; opacity: 0.5; transition: 0.4s; }
        nav a:hover, nav a.active { opacity: 1; color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .name { font-size: clamp(3.5rem, 12vw, 6.5rem); font-weight: 900; letter-spacing: -3px; background: linear-gradient(to bottom, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        
        .console { font-family: 'JetBrains Mono', monospace; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); color: var(--accent); margin: 30px 0; font-size: 1.2rem; }
        .console::before { content: "> "; color: #fff; }

        .btn { padding: 18px 40px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: 0.4s; margin-top: 20px; position: relative; overflow: hidden; border: 1px solid var(--primary); color: var(--primary); }
        .btn:hover { background: var(--primary); color: #fff; box-shadow: 0 0 30px var(--primary); }

        footer { position: absolute; bottom: 30px; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">/HOME</a>
        <a href="projects.html">/PROJECTS</a>
        <a href="cv.html">/CV</a>
    </nav>
    <div class="hero">
        <h1 class="name">LIN SHU-JEN</h1>
        <div class="console">Robotics & Embodied AI Architect</div>
        <p style="color: #888; max-width: 500px; line-height: 1.8;">Incoming Dual MS at University of Cincinnati. Specialized in Digital Twins, Defense R&D, and Industrial AI Synergies.</p>
        <a href="projects.html" class="btn">DISCOVER WORK</a>
        <footer>© 2026 DESIGNED FOR THE FUTURE OF ROBOTICS</footer>
    </div>
</body>
</html>
