<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHU-JEN LIN | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #60a5fa; --bg: #0b0f1a; --text: #f1f5f9; --accent: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        nav { display: flex; justify-content: center; gap: 30px; padding: 25px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav a { color: var(--text); text-decoration: none; font-weight: 600; opacity: 0.6; transition: 0.3s; }
        nav a:hover, nav a.active { opacity: 1; color: var(--primary); }
        .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .name { font-size: clamp(3rem, 10vw, 5rem); font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .typewriter-box { height: 40px; margin: 20px 0; }
        .typewriter { font-family: 'Fira Code', monospace; color: var(--accent); font-size: 1.5rem; border-right: 3px solid var(--accent); white-space: nowrap; overflow: hidden; display: inline-block; animation: typing 3.5s steps(40, end), blink 0.75s infinite; }
        .btn { padding: 15px 35px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; margin-top: 30px; background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .btn:hover { transform: translateY(-5px); background: #2563eb; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--accent) } }
    </style>
</head>

        <p style="color: #94a3b8; max-width: 650px; font-size: 1.1rem;">Incoming Dual MS @ University of Cincinnati. Specialized in Digital Twins and Autonomous Systems.</p>
        <a href="projects.html" class="btn">Explore My Work</a>
    </div>
</body>
